services:
  nginx:
      image: nginx:alpine
      volumes:
        - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      ports:
        - "80:80"
      depends_on:
        - frontend
        - backend

  db:
    image: postgres:16.13
    ports:
      - "5432:5432"
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    depends_on:
      - db
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend

volumes:
  postgres_data: